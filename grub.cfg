
serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
terminal_input serial
terminal_output serial

set timeout=0
set default=0


menuentry "Horus 64-bit Secure Microkernel" {
    insmod multiboot2
    set root=(cd)

    multiboot2 /boot/kernel.elf
    # @HORUS_MODULES@ is replaced by the boot.iso rule with one `module2` line per
    # BOOT_MODULES entry (none in a default build). GRUB loads each module into RAM
    # outside the kernel image; the kernel records them from the multiboot2 tags.
@HORUS_MODULES@
    boot
}
