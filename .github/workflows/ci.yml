name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Newer pushes to the same ref cancel older in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN permissions (defense-in-depth for CI)
permissions:
  contents: read
  actions: read
  pull-requests: read
  # No write permissions by default. upload-artifact is specially granted by GitHub for this workflow.

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust unit tests + clippy (deny-warnings gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install clippy component
        run: rustup component add clippy
      - name: Unit tests (release)
        run: cargo test --manifest-path rust/Cargo.toml --release
      - name: Clippy — all targets, deny every warning
        run: cargo clippy --manifest-path rust/Cargo.toml --release --all-targets -- -D warnings

  kernel:
    name: Build kernel.elf + bootable ISO (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Build kernel.elf
        run: make
      - name: Build bootable ISO
        run: make boot.iso
      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: horus-kernel-x86_64
          path: |
            kernel.elf
            boot.iso
          if-no-files-found: error

  # Keep the non-default build configurations compiling. The default config is
  # covered by the `kernel` job above; these flags (DEBUG_SHELL, MINIMAL_SECURE)
  # toggle whole regions of the kernel via #ifdef and have broken silently
  # before when only the default build was checked. A bare `make` (no ISO) is
  # enough to catch that; -Werror=vla in CFLAGS also gates here.
  altconfigs:
    name: Build alternate configs (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - DEBUG_SHELL=1
          - MINIMAL_SECURE=1
    steps:
      - uses: actions/checkout@v7
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Build kernel.elf (${{ matrix.config }})
        run: make ${{ matrix.config }}

  smoke:
    name: QEMU smoke-boot (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot the kernel under QEMU and assert it reaches the shell
        run: make smoke

  reproducible:
    name: Verify reproducible kernel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential binutils make
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Build twice and compare kernel.elf hashes
        run: |
          make reproducible-build
          sha256sum kernel.elf | tee first.sha
          make reproducible-build
          sha256sum kernel.elf | tee second.sha
          if ! diff -u first.sha second.sha; then
            echo "::error::kernel.elf is not byte-for-byte reproducible"
            exit 1
          fi
          echo "kernel.elf is byte-for-byte reproducible across clean builds"

  # Advisory job: surfaces SAST/secret/dependency findings and an SBOM for
  # review, but does NOT gate merges. `make security` is advisory by design
  # (four of its six scanners already swallow failures), and it scans the
  # workflow files and host tooling with rulesets (incl. semgrep --config=auto)
  # whose findings — e.g. mutable action tags, curl|sh installs — are CI
  # hygiene rather than kernel defects, and whose registry-fetched rules can
  # change with no code change. The hard gates are the other four jobs (rust,
  # kernel, smoke, reproducible). Steps use continue-on-error so a finding or a
  # flaky tool download reports without reddening the pipeline, and the SBOM
  # step still runs.
  security:
    name: Security scans + SBOM generation (Semgrep, Trivy, gitleaks, etc.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # needed for gitleaks full history scan

      - name: Install security tools + Rust target (pinned where practical)
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck flawfinder
          pipx install semgrep || pip install semgrep
          # Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          # gitleaks pinned
          go install github.com/gitleaks/gitleaks@v8.21.0 || true
          # Rust bare-metal target for cargo-audit and Makefile
          rustup target add x86_64-unknown-none
          cargo install cargo-audit || true

      - name: Run security checks (advisory)
        continue-on-error: true
        run: make security

      - name: Generate SBOM (CycloneDX via Trivy)
        continue-on-error: true
        run: |
          trivy fs --format cyclonedx --output sbom.cyclonedx.json \
            --scanners vuln,secret,misconfig .
          echo "SBOM generated: sbom.cyclonedx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: horus-sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: warn
