        run: make smoke-init-fs

  smoke-newlib:
    name: QEMU newlib libc self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      # newlib/ is gitignored, so unlike every other job this one has a
      # dependency the checkout does not carry. Cache the built libc across
      # runs; the key tracks the build script, which pins the newlib version.
      - name: Cache built newlib
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: newlib/install
          key: newlib-${{ runner.os }}-${{ hashFiles('tools/build_newlib.sh') }}
      - name: Build newlib (no-op on cache hit)
        run: tools/build_newlib.sh
      - name: Boot NEWLIB_SELFTEST kernel and assert the newlib libc port over the POSIX fd layer works
        run: make smoke-newlib

  reproducible:
    name: Verify reproducible kernel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential binutils make
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Build twice and compare kernel.elf hashes
        run: |
          make reproducible-build
          sha256sum kernel.elf | tee first.sha
          make reproducible-build
          sha256sum kernel.elf | tee second.sha
          if ! diff -u first.sha second.sha; then
            echo "::error::kernel.elf is not byte-for-byte reproducible"
            exit 1
          fi
          echo "kernel.elf is byte-for-byte reproducible across clean builds"

  # Advisory job: surfaces SAST/secret/dependency findings and an SBOM for
  # review, but does NOT gate merges. `make security` is advisory by design
  # (four of its six scanners already swallow failures), and it scans the
  # workflow files and host tooling with rulesets (incl. semgrep --config=auto)
  # whose findings — e.g. mutable action tags, curl|sh installs — are CI
  # hygiene rather than kernel defects, and whose registry-fetched rules can
  # change with no code change. The hard gates are the other four jobs (rust,
  # kernel, smoke, reproducible). Steps use continue-on-error so a finding or a
  # flaky tool download reports without reddening the pipeline, and the SBOM
  # step still runs.
  security:
    name: Security scans + SBOM generation (Semgrep, Trivy, gitleaks, etc.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0   # needed for gitleaks full history scan

      - name: Install security tools + Rust target (pinned where practical)
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck flawfinder
          pipx install semgrep || pip install semgrep
          # Trivy — pinned release + checksum verification (avoids curl|sh)
          TRIVY_VERSION=0.72.0
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz -o trivy.tar.gz
          echo "bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea  trivy.tar.gz" | sha256sum --check
          tar -xzf trivy.tar.gz trivy && sudo mv trivy /usr/local/bin/ && rm trivy.tar.gz
          # gitleaks pinned
          go install github.com/gitleaks/gitleaks@v8.21.0 || true
          # Rust bare-metal target for cargo-audit and Makefile
          rustup target add x86_64-unknown-none
          cargo install cargo-audit || true

      - name: Run security checks (advisory)
        continue-on-error: true
        run: make security

      - name: Generate SBOM (CycloneDX via Trivy)
        continue-on-error: true
        run: |
          trivy fs --format cyclonedx --output sbom.cyclonedx.json \
            --scanners vuln,secret,misconfig .
          echo "SBOM generated: sbom.cyclonedx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: horus-sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: warn

  # Advisory job: coverage-guided fuzzing of the pointer/scalar FFI predicates in
  # the Rust security core (rust/fuzz). Non-gating by design — it hunts panics/UB
  # on adversarial inputs, but a finding (or a flaky nightly/libFuzzer setup) must
  # not redden the pipeline. The hard gates stay the other four jobs (rust,
  # kernel, smoke, reproducible). Short per-target budget for CI; run longer
  # locally with `cargo +nightly fuzz run <target>`.
  fuzz:
    name: FFI fuzzing (cargo-fuzz, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install nightly toolchain + cargo-fuzz
        continue-on-error: true
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add --toolchain nightly rust-src
          cargo install cargo-fuzz || true

      - name: Build fuzz targets
        continue-on-error: true
        working-directory: rust
        run: cargo +nightly fuzz build

      - name: Run fuzz targets (short budget)
        continue-on-error: true
        working-directory: rust
        run: |
          for t in ct_eq validate_page_fault signal_handler_addr elf_validate_header elf_load_plan elf_i386_reloc elf_x86_64_reloc; do
            echo "== fuzzing $t =="
            cargo +nightly fuzz run "$t" -- -max_total_time=30 -rss_limit_mb=4096 || true
          done

  # Advisory job: Kani bounded model checking of the capability engine's
  # authority invariants (rust/src/capability.rs #[cfg(kani)] harnesses; see
  # rust/KANI.md). Non-gating by design — Kani is a heavy separate toolchain
  # (its own nightly + a ~140 MB CBMC bundle), so a slow or flaky setup must not
  # redden the pipeline. The hard gates stay rust, kernel, smoke, reproducible.
  kani:
    name: Formal verification (Kani, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install Kani
        continue-on-error: true
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Verify capability-engine proofs
        continue-on-error: true
        working-directory: rust
        run: cargo kani
