name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# Newer pushes to the same ref cancel older in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN permissions (defense-in-depth for CI)
permissions:
  contents: read
  actions: read
  pull-requests: read
  # No write permissions by default. upload-artifact is specially granted by GitHub for this workflow.

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust unit tests + clippy (deny-warnings gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install clippy component
        run: rustup component add clippy
      - name: Unit tests (release)
        run: cargo test --manifest-path rust/Cargo.toml --release
      - name: Clippy — all targets, deny every warning
        run: cargo clippy --manifest-path rust/Cargo.toml --release --all-targets -- -D warnings

  kernel:
    name: Build kernel.elf + bootable ISO (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Build kernel.elf
        run: make
      - name: Build bootable ISO
        run: make boot.iso
      - name: Upload kernel artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: horus-kernel-x86_64
          path: |
            kernel.elf
            boot.iso
          if-no-files-found: error

  # Keep the non-default build configurations compiling. The default config is
  # covered by the `kernel` job above; these flags (DEBUG_SHELL, MINIMAL_SECURE)
  # toggle whole regions of the kernel via #ifdef and have broken silently
  # before when only the default build was checked. A bare `make` (no ISO) is
  # enough to catch that; -Werror=vla in CFLAGS also gates here.
  altconfigs:
    name: Build alternate configs (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - DEBUG_SHELL=1
          - MINIMAL_SECURE=1
          - SMP=1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Build kernel.elf (${{ matrix.config }})
        run: make ${{ matrix.config }}

  smoke:
    name: QEMU smoke-boot (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot the kernel under QEMU and assert it reaches the shell
        run: make smoke

  smoke-aspace:
    name: QEMU address-space reclaim self-test (a rebuilt slot leaks nothing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Rebuild a task slot repeatedly and assert the page pool returns
        run: make smoke-aspace

  smoke-wx:
    name: QEMU kernel W^X self-test (no writable+executable page anywhere)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Assert the kernel image is r-x/r--/rw- and sweep every leaf for W+X
        run: make smoke-wx

  smoke-wx-smp:
    name: QEMU kernel W^X self-test, SMP (per-CPU AP IST stack guards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot multi-core and assert every AP IST fault stack sits above an unmapped guard
        run: make smoke-wx-smp

  smoke-captest:
    name: QEMU capability/syscall conformance self-test (refusals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Assert unheld capabilities, post-revoke use and bad input are all refused
        run: make smoke-captest

  smoke-modules:
    name: QEMU boot-module transport (printf / tail provisioned into /bin, run from FS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Ship printf/tail as GRUB modules, provision into /bin, run from the FS
        run: make smoke-modules

  smoke-modules-tamper:
    name: QEMU boot-module integrity gate (a tampered module payload is refused)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Corrupt one module payload in the ISO and assert the kernel refuses it
        run: make smoke-modules-tamper

  smoke-tpm:
    name: Measured boot (TPM PCRs match the reproducible manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU + swtpm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86 swtpm swtpm-tools python3
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot under an emulated TPM; assert PCR[8]/PCR[9] equal the host recomputation
        run: make smoke-tpm

  smoke-tpm-tamper:
    name: Measured boot falsification (a tampered module diverges the PCRs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU + swtpm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86 swtpm swtpm-tools python3
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Corrupt one module payload; assert it is refused AND the measured PCRs diverge
        run: make smoke-tpm-tamper

  smoke-tpm-seal-roundtrip:
    name: TPM seal/unseal round-trip (PolicyPCR-bound secret)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU + swtpm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86 swtpm swtpm-tools
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Seal a secret under PolicyPCR(8,9), unseal it, and prove it is denied after a PCR change
        run: make smoke-tpm-seal-roundtrip

  smoke-tpm-seal:
    name: TPM-sealed vdisk KEK (measured-good boot unlocks; changed PCR stays locked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU + swtpm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86 swtpm swtpm-tools
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Format the vdisk in TPM mode, unlock it, then require a changed PCR to leave it locked
        run: make smoke-tpm-seal

  smoke-coreutils-shell:
    name: QEMU GNU coreutils via the shell (head / wc / seq on real files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Drive head/wc/seq through the real ring-3 shell over serial
        run: make smoke-coreutils-shell

  smoke-cpu:
    name: QEMU CPU-protection self-test (SMEP/SMAP actually in CR4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot under -cpu +smep,+smap and assert both are detected and set in CR4
        run: make smoke-cpu

  smoke-stackguard:
    name: QEMU stack-guard self-test (canary re-seeded from CSPRNG, not the build constant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot and assert the live stack canary is no longer the compile-time default
        run: make smoke-stackguard

  smoke-elf:
    name: QEMU ELF-loader W^X self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot ELF_SELFTEST kernel and assert try_elf_load enforces W^X
        run: make smoke-elf

  smoke-elf64:
    name: QEMU ELF64 loader relocation self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot ELF64_SELFTEST kernel and assert the x86-64 RELA relocation applied
        run: make smoke-elf64

  smoke-preempt:
    name: QEMU preemptive-scheduling self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot PREEMPT_SELFTEST kernel and assert the timer time-slices two ring-3 tasks
        run: make smoke-preempt

  smoke-signal:
    name: QEMU signal-handling self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot SIGNAL_SELFTEST kernel and assert a ring-3 fault is delivered to its handler
        run: make smoke-signal

  smoke-tsd:
    name: QEMU RDTSC/TSD self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot TSD_SELFTEST kernel and assert a ring-3 RDTSC faults under CR4.TSD
        run: make smoke-tsd

  smoke-e820:
    name: QEMU E820 physical-pool self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot E820_SELFTEST kernel and assert the pool was sized from the multiboot2 memory map
        run: make smoke-e820

  smoke-smp:
    name: QEMU SMP self-test (headless, -smp 4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot SMP_SELFTEST kernel under -smp 4 and assert APs run scheduled tasks + TLB shootdown
        run: make smoke-smp

  smoke-console-smp:
    name: QEMU SMP console-output regression (headless, -smp 4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot the shipped kernel under -smp 4 and assert the login banner is intact (single console writer)
        run: make smoke-console-smp

  smoke-proc:
    name: QEMU process-control self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot PROC_SELFTEST kernel and assert SYS_EXIT + capability-gated SYS_KILL work
        run: make smoke-proc

  smoke-cow:
    name: QEMU copy-on-write self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot COW_SELFTEST kernel and assert shared zero page breaks to private pages in isolation
        run: make smoke-cow

  smoke-aslr:
    name: QEMU image-base ASLR self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot ASLR_SELFTEST kernel and assert the image base varies and stays inside the premap bound
        run: make smoke-aslr

  smoke-notify:
    name: QEMU async-notification self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot NOTIFY_SELFTEST kernel and assert SYS_NOTIFY delivers a badge to a blocked SYS_WAIT_NOTIFY
        run: make smoke-notify

  smoke-mapphys:
    name: QEMU map-phys device-frame self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot MAPPHYS_SELFTEST kernel and assert a CAP_IO_DEVICE task maps the allowlisted VGA frame (SYS_MAP_PHYS) and an off-list frame is refused
        run: make smoke-mapphys

  smoke-ioport:
    name: QEMU port-I/O bitmap self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot IOPORT_SELFTEST kernel and assert a CAP_IO_DEVICE task granted native port I/O reads an allowlisted port while a non-allowlisted port #GPs
        run: make smoke-ioport

  smoke-irq:
    name: QEMU IRQ-notification bridge self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential binutils make \
            xorriso grub-pc-bin grub-common mtools \
            qemu-system-x86
      - name: Add bare-metal Rust target
        run: rustup target add x86_64-unknown-none
      - name: Boot IRQ_SELFTEST kernel and assert a CAP_IO_DEVICE task can route a hardware IRQ to a notification (SYS_IRQ_REGISTER) and be woken by a real interrupt
        run: make smoke-irq

  smoke-console:
    name: QEMU ring-3 console-server self-test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install build toolchain + QEMU
        run: |
          sudo apt-get update
