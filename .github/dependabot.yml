# Dependabot configuration for Horus
# Even with zero external Rust dependencies today, this protects GitHub Actions
# and any future dependencies (cargo, docker, etc.).
# Schedule weekly to balance noise vs. security.

version: 2
updates:
  # GitHub Actions (highest priority for CI supply chain)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    # Group all Action bumps into a SINGLE PR. This is required for multi-ref
    # actions like github/codeql-action, whose `init` and `analyze` steps MUST be
    # the same version — Dependabot otherwise opens one PR per ref, producing a
    # v3-init/v4-analyze mismatch that fails CodeQL. One grouped PR bumps them
    # together. (Also keeps CI supply-chain updates to one reviewable PR.)
    groups:
      github-actions:
        patterns:
          - "*"
    # Reviewers can be added once team grows

  # Rust / Cargo. The crate has no external runtime dependencies today, but this
  # keeps the (dev/build) dependency graph and Cargo.lock monitored, and lights up
  # the moment a dependency is added — enabled per the July 2026 audit (P3).
  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(rust)"
    labels:
      - "dependencies"
      - "rust"

  # Future: Docker (if containerized builds are adopted)
  # - package-ecosystem: "docker"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
